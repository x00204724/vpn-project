[Interface]
# Server/Peer1: Main VPN server interface
PrivateKey = cJ8yfgyb8JK8qeEZKXImJ1f1TB4TOe0lXZOvxj3G8M=  # REPLACE with your server_private.key content
Address = 10.0.0.1/24  # Tunnel IPv4 subnet for this peer
ListenPort = 51820  # UDP listening port - standard WireGuard port
MTU = 1420  # Optimal MTU to avoid fragmentation

# PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE  # Uncomment for full routing
# PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
# Client/Peer2: Loopback demo peer (simulates remote client)
# In real setup, this would be a different machine
PublicKey = mZbdwiD2T1oMND8Yoe2IA9w8qk8sT8iO2dX2bY4g4A=  # REPLACE with your client_public.key
AllowedIPs = 10.0.0.2/32  # Route traffic destined for client&#39;s tunnel IP through tunnel
Endpoint = 127.0.0.1:51821  # Loopback endpoint (port 51821 for peer2 simulation)
PersistentKeepalive = 25  # Keep connection alive (handshake every 25s)

# For full bidirectional loopback, add second config wg1.conf for peer2 with swapped keys/ports/IPs

